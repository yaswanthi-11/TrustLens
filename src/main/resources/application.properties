# =============================================================================
# TrustLens X – Smart Threat Intelligence Platform
# Spring Boot Application Configuration
# =============================================================================
# Override any value via environment variables (Railway / Render / Docker).
# Example: SPRING_DATASOURCE_PASSWORD=secret mvn spring-boot:run
# =============================================================================

# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=TrustLens X

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# ── Database (MySQL 8.x) ───────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP – Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Schema script (database/schema.sql) – use 'always' only for fresh installs
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# ── Jackson JSON ─────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ── JWT Authentication ─────────────────────────────────────────────────────────
# Secret MUST be a 256-bit (64 hex char) key in production – set JWT_SECRET env var
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Email Alerts (Dangerous URL notifications) ───────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${SPRING_MAIL_PORT:2525}
spring.mail.username=${SPRING_MAIL_USERNAME:mock_username}
spring.mail.password=${SPRING_MAIL_PASSWORD:mock_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
trustlens.mail.from=${TRUSTLENS_MAIL_FROM:alerts@trustlensx.com}
trustlens.mail.enabled=${TRUSTLENS_MAIL_ENABLED:true}

# ── VirusTotal API Integration ───────────────────────────────────────────────
virustotal.api.key=${VIRUSTOTAL_API_KEY:mock_virustotal_api_key_replace_me_if_real}
virustotal.api.url=${VIRUSTOTAL_API_URL:https://www.virustotal.com/api/v3}
virustotal.api.enabled=${VIRUSTOTAL_API_ENABLED:false}

# ── Risk Score Engine (configurable thresholds) ──────────────────────────────
trustlens.risk.threshold.safe=20
trustlens.risk.threshold.low=50
trustlens.risk.threshold.suspicious=80
trustlens.risk.threshold.dangerous=100
trustlens.risk.max-url-length=200
trustlens.risk.max-hyphens=3
trustlens.risk.max-subdomains=3

# ── CORS (frontend origins – comma-separated) ─────────────────────────────────
trustlens.cors.allowed-origins=${TRUSTLENS_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Actuator (health checks for Railway / Render) ────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.trustlensx=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
